name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --reporter=verbose
        env:
          NODE_ENV: test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high || true

  check-schema-index:
    name: Schema Index Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify db/schema-index.ts is up to date
        run: |
          echo "Regenerating db/schema-index.ts from db/schema-*.ts files..."
          npx tsx scripts/sync-schema-index.ts
          if ! git diff --exit-code db/schema-index.ts; then
            echo "::error::db/schema-index.ts is stale. Run 'npx tsx scripts/sync-schema-index.ts' and commit the result."
            exit 1
          fi
          echo "db/schema-index.ts is up to date."

  check-migration-stubs:
    name: Migration Stub Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Check all schema columns have migration stubs
        run: |
          echo "Verifying every schema column has a corresponding migration stub..."
          npm run gen:migrations
          echo "All schema columns are covered by migration stubs."

  schema-drift:
    name: Schema Drift Check (Live DB)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify live DB matches the Drizzle schema
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL secret is not configured — skipping live schema drift check."
            echo "Add DATABASE_URL to repository secrets to enable this check."
            exit 0
          fi
          echo "Comparing live database columns against the Drizzle schema..."
          npm run check:schema

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, check-schema-index, check-migration-stubs, schema-drift]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
